project:
  type: website
  output-dir: _site
  resources:
    - CNAME
  render:
    - "*.qmd"
    - "content/"
    - "assignment/"
    - "labs/"
    - "quiz/"
    - "resource/"
    - "presentations/"
    - "!temp_dataviz_repo/**"

# Add extensions for icons and advanced features
extensions:
  - quarto-ext/fontawesome

website:
  page-navigation: true
  title: "Web Technology - BMC201"
  description: "Website for BMC201 Web Technology course (MCA Semester 2) at GCET, following AKTU curriculum"
  site-url: "https://webtech2025.classes.prashantnag.com"

  repo-url: "https://github.com/prashantnag/webtech2025"
  repo-actions: [edit, issue]

  open-graph: true
  twitter-card:
    creator: "@prashantnag"
    site: "@prashantnag"

  navbar:
    background: "#2C3E50"
    # logo: files/favicon-512.png
    # logo-alt: "BMC205 Web Technology logo"
    collapse-below: lg
    right:
      - text: "Home"
        file: index.qmd
      - text: "Syllabus"
        file: syllabus.qmd
      - text: "Schedule"
        file: schedule.qmd
      - text: "Materials"
        menu:
          - text: "Weekly Content"
            file: content/index.qmd
          - text: "Presentations"
            file: presentations/index.qmd
          - text: "Lab Manuals"
            file: labs/index.qmd
          - text: "Quizzes"
            file: quiz/index.qmd
          - text: "Resources"
            file: resource/index.qmd
      - text: "Assessments"
        menu:
          - text: "Assignments"
            file: assignment/index.qmd
          - text: "Assessment Calendar"
            file: schedule.qmd

  sidebar:
    - title: "Course Navigation"
      style: "docked"
      search: true
      background: light
      contents:
        - section: "Start Here"
          contents:
            - index.qmd
            - schedule.qmd
            - syllabus.qmd
        - section: "Weekly Materials"
          contents:
            - content/index.qmd
            - text: "Week 1-2: HTML & Introduction"
              file: content/week-01.qmd
            - text: "Week 2-3: HTML Elements & CSS"
              file: content/week-02.qmd
            - text: "Week 3: CSS & JavaScript Intro"
              file: content/week-03.qmd
            - text: "Week 4: JavaScript Functions"
              file: content/week-04.qmd
            - text: "Week 5: DOM & ES6+"
              file: content/week-05.qmd
            - text: "Week 6-7: Revision & Exam"
              file: content/week-06.qmd
            - text: "Week 8: Servlets & JSP Intro"
              file: content/week-08.qmd
            - text: "Week 9: JSP Advanced & MVC"
              file: content/week-09.qmd
            - text: "Week 10: Spring Framework"
              file: content/week-10.qmd
            - text: "Week 11: Spring Boot & Data"
              file: content/week-11.qmd
            - text: "Week 12: REST & Final Project"
              file: content/week-12.qmd
        - section: "Practice & Evaluation"
          contents:
            - presentations/index.qmd
            - labs/index.qmd
            - assignment/index.qmd
            - quiz/index.qmd
        - section: "Resources"
          contents:
            - resource/index.qmd
            - resource/tools.qmd
            - resource/web-servers.qmd

  page-footer:
    left: |
      Content © 2026 by [Prashant Kumar Nag](https://prashantnag.com) <br>
      All content licensed under a [Creative Commons Attribution-NonCommercial 4.0 International license (CC BY-NC 4.0)](https://creativecommons.org/licenses/by-nc/4.0/)
    right: |
      Made with [R](https://www.r-project.org/) and [Quarto](https://quarto.org/)<br>
      [View the source on GitHub](https://github.com/prashantnag/webtech2025)

format:
  html:
    theme:
      - cosmo
      - html/custom.scss
    css:
      - html/styles.css
    toc: true
    code-copy: true
    code-overflow: wrap
    mainfont: "Atkinson Hyperlegible"
    highlight-style: monokai

execute:
  freeze: auto

# Course-specific variables - NESTED (not flattened)
course:
  number: "BMC201"
  title: "Web Technology"
  semester: "MCA Semester 2"
  year: "2025-26"
  credits: "4 (3-1-0)"
  curriculum: "AKTU MCA Model Curriculum 2020-21"
  copyright_year: "2026"
  github: "https://github.com/prashantnag/webtech2025"
  institution: "Galgotias College of Engineering & Technology"

instructor:
  name: "Dr. Prashant Kumar Nag"
  name_no_title: "Prashant Kumar Nag"
  title: "Assistant Professor"
  email: "prashantkumar.nag@galgotiacollege.edu"
  url: "https://prashantnag.com"
  office: "Department of Computer Applications"
